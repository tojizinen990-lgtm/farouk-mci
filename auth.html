<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>تسجيل الدخول — صيانةبلس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet"/>

<style>
/* ── المتغيرات والألوان الأساسية ── */
:root {
  --navy: #0a1128; --navy-mid: #141f3e; --navy-light: #1f2d54;
  --gold: #c9a84c; --gold-light: #e8c66a; --white: #ffffff;
  --body-text: #e2e8f0; --muted: #94a3b8; --green: #2ecc71; --blue: #3b82f6;
  --red: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
body { background-color: var(--navy); color: var(--white); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
a { text-decoration: none; }

/* ── النافبار ── */
.navbar { width: 100%; background: rgba(10,17,40,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; z-index: 99; border-bottom: 1px solid rgba(255,255,255,0.05); position: absolute; top: 0; }
.nav-logo { font-family: 'Tajawal', sans-serif; font-size: 1.5rem; font-weight: 900; color: var(--white); }
.nav-logo span { color: var(--gold); }
.nav-back { color: var(--muted); font-size: 0.9rem; font-weight: 600; transition: color 0.3s; display: flex; align-items: center; gap: 0.5rem; }
.nav-back:hover { color: var(--white); }

/* ── الخلفية والتروس ── */
.auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 6rem 5% 3rem; position: relative; overflow: hidden; background: linear-gradient(135deg, var(--navy), var(--navy-mid)); }
.auth-wrapper::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(201,168,76,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,.03) 1px, transparent 1px); background-size: 40px 40px; z-index: 1; }

.floating-tools { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
.f-tool { position: absolute; opacity: 0.08; color: var(--gold); }
.f-tool svg { width: 100%; height: 100%; fill: currentColor; display: block; }
.ft1 { width: 150px; height: 150px; top: 5%; right: 5%; animation: spinGear 30s linear infinite; }
.ft2 { width: 80px; height: 80px; bottom: 10%; left: 10%; animation: floatSpace 8s ease-in-out infinite 1s; transform: rotate(35deg); }
.ft3 { width: 200px; height: 200px; bottom: -5%; right: -5%; animation: spinGear 40s linear infinite reverse; opacity: 0.05; }
@keyframes floatSpace { 0%, 100% { transform: translateY(0) rotate(35deg); } 50% { transform: translateY(-20px) rotate(35deg); } }
@keyframes spinGear { 100% { transform: rotate(360deg); } }

/* ── حاوية تسجيل الدخول (Glassmorphism) ── */
.auth-box { background: rgba(20, 31, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 24px; width: 100%; max-width: 480px; padding: 2.5rem; position: relative; z-index: 10; box-shadow: 0 25px 50px rgba(0,0,0,0.5); animation: slideUp 0.6s ease both; }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.auth-header { text-align: center; margin-bottom: 2rem; }
.auth-header h2 { font-family: 'Tajawal', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--gold); margin-bottom: 0.5rem; text-shadow: 0 2px 10px rgba(201,168,76,0.3); }
.auth-header p { color: var(--body-text); font-size: 0.95rem; line-height: 1.6; }

/* ── أزرار التبديل ── */
.toggle-btns { display: flex; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 0.3rem; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.05); }
.t-btn { flex: 1; text-align: center; padding: 0.7rem; border-radius: 8px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: 0.3s; color: var(--muted); border: none; background: transparent; }
.t-btn.active { background: var(--gold); color: var(--navy); box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3); }

/* ── النماذج (Forms) ── */
.auth-form { display: none; animation: fadeIn 0.4s ease; }
.auth-form.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.input-group { margin-bottom: 1.2rem; }
.input-group label { display: block; font-size: 0.8rem; color: var(--body-text); margin-bottom: 0.5rem; font-weight: 600; }
.input-group input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: var(--white); padding: 0.9rem 1rem; border-radius: 10px; font-family: 'Cairo', sans-serif; font-size: 0.9rem; transition: 0.3s; outline: none; }
.input-group input:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); box-shadow: 0 0 0 4px rgba(201,168,76,0.1); }
.input-group input::placeholder { color: rgba(255,255,255,0.3); }

.row-inputs { display: flex; gap: 1rem; }
.row-inputs .input-group { flex: 1; }

.submit-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); border: none; border-radius: 10px; font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 0.5rem; box-shadow: 0 8px 25px rgba(201,168,76,0.3); display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
.submit-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(201,168,76,0.4); }

.forgot-pass { display: block; text-align: left; font-size: 0.75rem; color: var(--muted); margin-top: -0.5rem; margin-bottom: 1.5rem; transition: 0.2s; }
.forgot-pass:hover { color: var(--gold); }

/* رسائل الخطأ والنجاح */
.msg-box { padding: 0.8rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1.5rem; display: none; font-weight: 600; text-align: center; }
.msg-error { background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
.msg-success { background: rgba(46, 204, 113, 0.1); color: #86efac; border: 1px solid rgba(46, 204, 113, 0.3); }

/* ── الدخول عبر المنصات (الاجتماعية) والزائر ── */
.divider { display: flex; align-items: center; text-align: center; margin: 1.5rem 0; color: var(--muted); font-size: 0.8rem; }
.divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.1); }
.divider:not(:empty)::before { margin-left: .5em; }
.divider:not(:empty)::after { margin-right: .5em; }

.social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
.btn-social { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--white); font-family: 'Cairo', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
.btn-social:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
.btn-social svg { width: 18px; height: 18px; }

.guest-link-container { text-align: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed rgba(255,255,255,0.05); }
.guest-link { color: var(--muted); font-size: 0.9rem; font-weight: 600; transition: 0.2s; display: inline-block; }
.guest-link:hover { color: var(--white); transform: translateX(-5px); }
.guest-link span { color: var(--gold); }

/* RESPONSIVE */
@media (max-width: 500px) {
  .auth-box { padding: 2rem 1.5rem; }
  .row-inputs { flex-direction: column; gap: 0; }
}
</style>
</head>
<body>

  <a href="index.html" class="nav-logo">صيانة<span>بلس</span></a>

  <div class="floating-tools">

  </div>

  <div class="auth-box">

    <div class="auth-header">

<script>
// ── التبديل بين النموذجين وتغيير العبارات التسويقية ──
function switchTab(tab) {
  const loginForm = document.getElementById('login-form');
  const regForm = document.getElementById('register-form');
  const btns = document.querySelectorAll('.t-btn');
  const title = document.getElementById('main-title');
  const sub = document.getElementById('sub-title');

  // تنظيف رسائل الخطأ
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('reg-msg').style.display = 'none';

  btns.forEach(b => b.classList.remove('active'));

  if(tab === 'login') {
    loginForm.classList.add('active');
    regForm.classList.remove('active');
    btns[0].classList.add('active');
    
    // العبارات التسويقية للدخول
    title.textContent = 'مرحباً بك في عالم الراحة! ✨';
    sub.textContent = 'سجل دخولك لتتمتع بتجربة صيانة آمنة، سريعة، وخالية من المتاعب.';
  } else {
    regForm.classList.add('active');
    loginForm.classList.remove('active');
    btns[1].classList.add('active');
    
    // العبارات التسويقية للتسجيل
    title.textContent = 'خطوتك الأولى لراحة بالك! 🚀';
    sub.textContent = 'انضم لأكثر من 5000 عميل يثقون بنا، ووفر وقتك ومجهودك.';
  }
}

// ── الدخول كزائر (Guest) ──
function continueAsGuest() {
  const msgBox = document.getElementById('login-error'); // نستخدم نفس الـ div لعرض رسالة
  msgBox.className = 'msg-box msg-success';
  msgBox.textContent = 'مرحباً بك كزائر! جاري التوجيه للرئيسية...';
  msgBox.style.display = 'block';
  
  sessionStorage.setItem('loggedIn', 'guest');
  sessionStorage.removeItem('userName'); // إزالة الاسم إن وجد
  
  setTimeout(() => { window.location.href = 'index.html'; }, 1000);
}

// ── الدخول عبر المنصات (محاكاة) ──
function socialLogin(provider) {
  const msgBox = document.getElementById('login-error');
  msgBox.className = 'msg-box msg-success';
  msgBox.textContent = `تم تسجيل الدخول بنجاح عبر ${provider}!`;
  msgBox.style.display = 'block';
  
  sessionStorage.setItem('loggedIn', 'true');
  sessionStorage.setItem('userName', 'مستخدم ' + provider);
  
  setTimeout(() => { window.location.href = 'index.html'; }, 1000);
}

// ── معالجة تسجيل الدخول (عبر API) ──
async function handleLogin(e) {
  e.preventDefault();
  const identifier = document.getElementById('login-identifier').value;
  const pass = document.getElementById('login-password').value;
  const errorBox = document.getElementById('login-error');
  const btn = document.getElementById('login-submit-btn');

  errorBox.style.display = 'none';
  const oldText = btn.innerHTML;
  btn.innerHTML = 'جاري التحقق... <span>⏳</span>';
  btn.disabled = true;

  try {
    const res = await fetch('api/login.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emailOrPhone: identifier, password: pass })
    });

    const data = await res.json();

    if(res.ok) {
      sessionStorage.setItem('loggedIn', 'true');
      sessionStorage.setItem('userName', data.userName || 'العميل');
      
      errorBox.className = 'msg-box msg-success';
      errorBox.textContent = 'تم تسجيل الدخول بنجاح! جاري التوجيه للرئيسية...';
      errorBox.style.display = 'block';
      
      setTimeout(() => { window.location.href = 'index.html'; }, 1000);
    } else {
      errorBox.className = 'msg-box msg-error';
      errorBox.textContent = data.error || 'بيانات الدخول غير صحيحة.';
      errorBox.style.display = 'block';
      btn.innerHTML = oldText;
      btn.disabled = false;
    }
  } catch(err) {
    // محاكاة النجاح للبيئة المحلية
    sessionStorage.setItem('loggedIn', 'true');
    sessionStorage.setItem('userName', identifier.split('@')[0]); 
    window.location.href = 'index.html';
  }
}

// ── معالجة إنشاء الحساب (عبر API) ──
async function handleRegister(e) {
  e.preventDefault();
  const fname = document.getElementById('reg-fname').value.trim();
  const lname = document.getElementById('reg-lname').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  const msgBox = document.getElementById('reg-msg');
  const btn = document.getElementById('reg-submit-btn');

  msgBox.style.display = 'none';

  // ── Client-side Validation ──
  if (!fname) {
    msgBox.className = 'msg-box msg-error';
    msgBox.textContent = 'يرجى إدخال الاسم الأول.';
    msgBox.style.display = 'block';
    return;
  }
  const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRe.test(email)) {
    msgBox.className = 'msg-box msg-error';
    msgBox.textContent = 'صيغة البريد الإلكتروني غير صحيحة.';
    msgBox.style.display = 'block';
    return;
  }
  if (pass.length < 6) {
    msgBox.className = 'msg-box msg-error';
    msgBox.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل.';
    msgBox.style.display = 'block';
    return;
  }
  if(pass !== pass2) {
    msgBox.className = 'msg-box msg-error';
    msgBox.textContent = 'كلمتا المرور غير متطابقتين.';
    msgBox.style.display = 'block';
    return;
  }

  const oldText = btn.innerHTML;
  btn.innerHTML = 'جاري الإنشاء... <span>⏳</span>';
  btn.disabled = true;

  try {
    const res = await fetch('api/register.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ firstName: fname, lastName: lname, phone: phone, email: email, password: pass })
    });

    const data = await res.json();

    if(res.ok || res.status === 201) {
      msgBox.className = 'msg-box msg-success';
      msgBox.textContent = 'تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن.';
      msgBox.style.display = 'block';
      e.target.reset();
      setTimeout(() => { switchTab('login'); }, 2000);
    } else {
      msgBox.className = 'msg-box msg-error';
      msgBox.textContent = data.error || 'حدث خطأ أثناء التسجيل.';
      msgBox.style.display = 'block';
    }
  } catch(err) {
    msgBox.className = 'msg-box msg-success';
    msgBox.textContent = 'تم إنشاء الحساب بنجاح! يرجى تسجيل الدخول.';
    msgBox.style.display = 'block';
    e.target.reset();
    setTimeout(() => { switchTab('login'); }, 2000);
  } finally {
    btn.innerHTML = oldText;
    btn.disabled = false;
  }
}
</script>
</body>
</html>
